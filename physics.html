<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>12th Physics Question Bank</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f7fb;
        }

        header{
            background:#0b3d91;
            color:white;
            text-align:center;
            padding:35px 20px;
        }

        header h1{
            font-size:36px;
            margin-bottom:10px;
        }

        header p{
            font-size:18px;
        }

        .container{
            width:90%;
            max-width:900px;
            margin:40px auto;
        }

        .card{
            background:white;
            padding:25px;
            margin-bottom:20px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.12);
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:20px;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
            box-shadow:0 8px 20px rgba(0,0,0,0.18);
        }

        .card h2{
            color:#0b3d91;
            font-size:21px;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            background:#ff9800;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
            white-space:nowrap;
            transition:0.3s;
        }

        .btn:hover{
            background:#e68900;
        }

        .back{
            display:inline-block;
            margin-top:20px;
            padding:12px 20px;
            background:#0b3d91;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
        }

        .back:hover{
            background:#072c6c;
        }

        @media(max-width:600px){
            header h1{
                font-size:27px;
            }

            .card{
                flex-direction:column;
                text-align:center;
            }

            .btn{
                width:100%;
                text-align:center;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>📘 12th Board Physics Question Bank</h1>
    <p>Shri Chhatrapati Shivaji Junior College</p>
</header>

<div class="container">

    <div class="card">
        <h2>📄 Physics 2024 — Paper 1</h2>
        <a href="physics.2024.pdf" class="btn" target="_blank">
            Open PDF
        </a>
    </div>

    <div class="card">
        <h2>📄 Physics 2024 — Paper 2</h2>
        <a href="physics.2024.2.pdf" class="btn" target="_blank">
            Open PDF
        </a>
    </div>

    <div class="card">
        <h2>📄 Physics 2025 — Paper 1</h2>
        <a href="physics.2025.pdf" class="btn" target="_blank">
            Open PDF
        </a>
    </div>

    <div class="card">
        <h2>📄 Physics 2025 — Paper 2</h2>
        <a href="physics.2025.2.pdf" class="btn" target="_blank">
            Open PDF
        </a>
    </div>

    <a href="science-questionbank.html" class="back">
        ← Back to Science Subjects
    </a>

</div>

</body>
</html>
