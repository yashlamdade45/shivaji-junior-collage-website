<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>College Gallery</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f7fb;
}

header{
    background:#0b5ed7;
    color:#fff;
    text-align:center;
    padding:30px;
}

header h1{
    margin:0;
    font-size:40px;
}

header p{
    margin-top:10px;
    font-size:18px;
}

.gallery{
    width:90%;
    max-width:1200px;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.gallery img:hover{
    transform:scale(1.05);
}

.preview{
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.preview img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:35px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

.back{
    display:block;
    width:max-content;
    margin:30px auto 50px;
    padding:12px 25px;
    background:#0b5ed7;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.back:hover{
    background:#084298;
}
</style>

</head>

<body>

<header>
<h1>College Gallery</h1>
<p>Shri Chhatrapati Shivaji Junior College</p>
</header>

<div class="gallery">

<img src="images/gallery/gallery1.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery2.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery3.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery4.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery5.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery6.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery7.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery8.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery9.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery10.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery11.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery12.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery13.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery14.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery15.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery16.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery17.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery18.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery19.jpeg" onclick="show(this.src)">
<img src="images/gallery/gallery20.jpeg" onclick="show(this.src)">

</div>

<div class="preview" id="preview">
<span class="close" onclick="hide()">&times;</span>
<img id="previewImg">
</div>

<a href="index.html" class="back">⬅ Back to Home</a>

<script>
function show(src){
document.getElementById("preview").style.display="flex";
document.getElementById("previewImg").src=src;
}

function hide(){
document.getElementById("preview").style.display="none";
}
</script>

</body>
</html>
