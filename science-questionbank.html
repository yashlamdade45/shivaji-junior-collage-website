<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Question Bank</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}

header{
    background:#0b5ed7;
    color:white;
    text-align:center;
    padding:20px;
}

.subjects{
    width:90%;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 3px 8px rgba(0,0,0,.2);
    text-align:center;
}

.card h2{
    color:#0b5ed7;
}

.btn{
    display:inline-block;
    margin-top:15px;
    padding:10px 20px;
    background:#ff9800;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}
</style>

</head>

<body>

<header>
<h1>🔬 Science Subjects</h1>
<p>Select a Subject</p>
</header>

<div class="subjects">

<div class="card">
<h2>English</h2>
<a href="english.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Hindi / Marathi</h2>
<a href="language.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Physics</h2>
<a href="physics.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Chemistry</h2>
<a href="chemistry.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Biology</h2>
<a href="biology.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Mathematics</h2>
<a href="mathematics.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Animal Science</h2>
<a href="animalscience.html" class="btn">Open</a>
</div>

<div class="card">
<h2>Sociology</h2>
<a href="sociology.html" class="btn">Open</a>
</div>

</div>

</body>
</html>
